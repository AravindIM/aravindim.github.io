<div class="flex author">
  {{ with .Site.Params.Author.image }}
    <div class="relative w-24 h-24 rounded-full bg-neutral-200 animate-pulse me-4" data-shimmer-container>
      <img
        class="absolute inset-0 w-full h-full object-cover rounded-full"
        width="96"
        height="96"
        alt="{{ $.Site.Params.Author.name | default "Author" }}"
        loading="lazy"
        decoding="async"
        src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3C/svg%3E"
        data-author-image="true"
        data-author-url="{{ . }}">
    </div>
  {{ end }}
  <div class="place-self-center">
    {{ with .Site.Params.Author.name | markdownify }}
      <div class="text-[0.6rem] uppercase leading-3 text-neutral-500 dark:text-neutral-400">
        {{ i18n "author.byline_title" | markdownify }}
      </div>
      <div class="font-semibold leading-6 text-neutral-800 dark:text-neutral-300">
        {{ . }}
      </div>
    {{ end }}
    {{ with .Site.Params.Author.bio | markdownify }}
      <div class="text-sm text-neutral-700 dark:text-neutral-400">{{ . }}</div>
    {{ end }}
    <div class="text-2xl sm:text-lg">{{ partialCached "author-links.html" . }}</div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const authorImages = document.querySelectorAll('[data-author-image="true"]');
  authorImages.forEach(img => {
    const container = img.closest('[data-shimmer-container]');
    if (container) container.classList.add('bg-neutral-200','animate-pulse');
    const url = img.getAttribute('data-author-url');
    if (url) {
      img.onload = () => {
        if (container) container.classList.remove('bg-neutral-200','animate-pulse');
      };
      img.src = url; // allow normal caching
    } else if (container) {
      container.classList.remove('bg-neutral-200','animate-pulse');
    }
  });
});
</script>
